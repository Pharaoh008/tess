<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amazon 产品信息抓取</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="query-panel">
          <div>
            <p class="eyebrow">Amazon Product Fetcher</p>
            <h1>输入国家和 ASIN，抓取产品核心信息</h1>
          </div>

          <form id="scrape-form" class="form-grid">
            <label>
              <span>国家</span>
              <select id="country" name="country" required>
                <option value="us">美国 amazon.com</option>
                <option value="uk">英国 amazon.co.uk</option>
                <option value="de">德国 amazon.de</option>
                <option value="fr">法国 amazon.fr</option>
                <option value="it">意大利 amazon.it</option>
                <option value="es">西班牙 amazon.es</option>
                <option value="ca">加拿大 amazon.ca</option>
                <option value="jp">日本 amazon.co.jp</option>
                <option value="au">澳大利亚 amazon.com.au</option>
                <option value="mx">墨西哥 amazon.com.mx</option>
                <option value="nl">荷兰 amazon.nl</option>
                <option value="se">瑞典 amazon.se</option>
                <option value="pl">波兰 amazon.pl</option>
                <option value="tr">土耳其 amazon.com.tr</option>
                <option value="ae">阿联酋 amazon.ae</option>
                <option value="sa">沙特 amazon.sa</option>
                <option value="in">印度 amazon.in</option>
                <option value="sg">新加坡 amazon.sg</option>
                <option value="br">巴西 amazon.com.br</option>
              </select>
            </label>

            <label>
              <span>ASIN</span>
              <input id="asin" name="asin" type="text" inputmode="latin" maxlength="10" placeholder="例如 B08N5WRWNW" required>
            </label>

            <button id="submit-button" type="submit">
              <span class="button-icon" aria-hidden="true">↗</span>
              抓取信息
            </button>
          </form>
        </div>

        <section id="result" class="result-panel empty">
          <div class="empty-state">
            <div class="empty-mark">ASIN</div>
            <p>等待输入产品信息</p>
          </div>
        </section>
      </section>
    </main>

    <template id="product-template">
      <article class="product-card">
        <div class="image-frame">
          <img id="product-image" alt="Amazon 产品首图">
        </div>
        <div class="product-detail">
          <div class="meta-row">
            <span id="marketplace"></span>
            <a id="product-link" target="_blank" rel="noreferrer">打开 Amazon 页面</a>
          </div>
          <h2 id="product-title"></h2>
          <dl class="stats">
            <div>
              <dt>Rating</dt>
              <dd id="rating"></dd>
            </div>
            <div>
              <dt>评论数</dt>
              <dd id="review-count"></dd>
            </div>
          </dl>
          <div class="bullets-wrap">
            <h3>五行</h3>
            <ol id="bullets"></ol>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
